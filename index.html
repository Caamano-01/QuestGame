<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuestGame</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Quest Game</h1>
    </header>

    <main class="container">
        <div class="card">
            <label for="tema">Escolha o tema:</label>

            <select id="tema">
                <option value="python">Python</option>
                <option value="php">Php</option>
            </select>

            <button onclick="">Começar</button>

            <!-- pergunta -->
             <p id="pergunta"></p>

            <!-- respostas -->
             <div id="opcoes"></div>

            <!-- status -->
             <p id="status"></p>

            <script src="script.js"></script>
        </div>
    </main>
</body>
</html>
